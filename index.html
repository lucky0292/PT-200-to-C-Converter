<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT-200 Universal Converter</title>
    <style>
        :root {
            --primary-blue: #1a73e8;
            --dark-grey: #202124;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: #f1f3f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .app-card {
            background: white;
            width: 100%;
            max-width: 400px; /* Desktop width limit */
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { color: var(--primary-blue); margin-top: 0; }
        .input-area { margin: 25px 0; }
        label { display: block; margin-bottom: 10px; font-weight: 600; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #dfe1e5;
            border-radius: 10px;
            font-size: 1.2rem;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--primary-blue); }
        .result-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #e8eaed;
        }
        #temp-out { font-size: 3rem; font-weight: bold; color: var(--dark-grey); }
        .unit { font-size: 1.1rem; color: #70757a; }

        /* Media Query: Adjusts for very small phones */
        @media (max-width: 350px) {
            .app-card { padding: 1rem; }
            #temp-out { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <h2>PT-200 (Ω to °C) Converter</h2>
    <div class="input-area">
        <label>Resistance (Ohms Ω)</label>
        <input type="number" id="resInput" placeholder="Enter Ω..." oninput="calculate()">
    </div>
    <div class="result-display">
        <div id="temp-out">--</div>
        <div class="unit">Celsius (°C)</div>
    </div>
</div>

<script>
    function calculate() {
        const Rs = parseFloat(document.getElementById('resInput').value);
        const display = document.getElementById('temp-out');
        
        if (isNaN(Rs) || Rs < 0) {
            display.innerText = "--";
            return;
        }

        // Data from your Sensata Datasheet
        const RI = 0.5; 
        const RO = 200.0;
        const alpha = 3.8285e-3;
        const beta = -5.85e-7;

        const term = 1 - (Rs - RI) / RO;
        const discriminant = Math.pow(alpha, 2) - (4 * beta * term);
        
        if (discriminant < 0) {
            display.innerText = "Err";
        } else {
            const temp = (-alpha + Math.sqrt(discriminant)) / (2 * beta);
            display.innerText = temp.toFixed(1);
        }
    }
</script>
</body>
</html>
